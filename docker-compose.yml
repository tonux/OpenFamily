version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openfamily-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openfamily}
      POSTGRES_USER: ${POSTGRES_USER:-openfamily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-openfamily}']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: openfamily-server
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-openfamily}
      POSTGRES_USER: ${POSTGRES_USER:-openfamily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SERVER_PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Cookie auth (sécu #10)
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      JWT_ACCESS_TTL_SEC: ${JWT_ACCESS_TTL_SEC:-3600}
      JWT_REFRESH_TTL_SEC: ${JWT_REFRESH_TTL_SEC:-604800}
      # Rate limiting global (sécu #9)
      API_RATE_LIMIT_WINDOW_MS: ${API_RATE_LIMIT_WINDOW_MS:-60000}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-300}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      # IA — sélection du provider (nvidia par défaut, gemini disponible).
      # Fournir la clé du provider choisi ; les autres champs ont un défaut.
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-nvidia}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_API_BASE_URL: ${NVIDIA_API_BASE_URL:-https://integrate.api.nvidia.com/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE_URL: ${GEMINI_API_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-}
      AI_MODEL_HEAVY: ${AI_MODEL_HEAVY:-}
      AI_MODEL_VISION: ${AI_MODEL_VISION:-}
      AI_MONTHLY_TOKEN_LIMIT_PER_USER: ${AI_MONTHLY_TOKEN_LIMIT_PER_USER:-2000000}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-30000}
      AI_STREAMING_ENABLED: ${AI_STREAMING_ENABLED:-true}
      # Weather (Open-Meteo, key-less) — dashboard widget météo + suggestions IA
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://api.open-meteo.com/v1/forecast}
      OPEN_METEO_GEOCODING_URL: ${OPEN_METEO_GEOCODING_URL:-https://geocoding-api.open-meteo.com/v1/search}
      WEATHER_CACHE_TTL_MS: ${WEATHER_CACHE_TTL_MS:-600000}
      WEATHER_REQUEST_TIMEOUT_MS: ${WEATHER_REQUEST_TIMEOUT_MS:-8000}
      WEATHER_DEFAULT_LANG: ${WEATHER_DEFAULT_LANG:-fr}
      # Object storage (MinIO, S3-compatible) — Phase 5 Documents/Projets
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-openfamily}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-openfamily-minio-2024}
      MINIO_BUCKET: ${MINIO_BUCKET:-openfamily}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      # Email notifications (Resend SMTP)
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      RESEND_SMTP_HOST: ${RESEND_SMTP_HOST:-smtp.resend.com}
      RESEND_SMTP_PORT: ${RESEND_SMTP_PORT:-465}
      RESEND_SMTP_USER: ${RESEND_SMTP_USER:-resend}
      RESEND_SMTP_PASSWORD: ${RESEND_SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      APP_BASE_URL: ${APP_BASE_URL}
      EMAIL_DIGEST_HOUR: ${EMAIL_DIGEST_HOUR:-8}
      EMAIL_TEST_ENABLED: ${EMAIL_TEST_ENABLED:-}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./server/uploads:/app/uploads

  minio:
    image: minio/minio:latest
    container_name: openfamily-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-openfamily}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-openfamily-minio-2024}
    volumes:
      - minio-data:/data
    ports:
      # 9000: S3 API consumed by the server. 9001: web console for ops/debug
      # — gate behind a firewall in prod or remove the port mapping.
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      # Built-in liveness — the MinIO image ships `mc` (admin client).
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    container_name: openfamily-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local
