version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openfamily-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openfamily}
      POSTGRES_USER: ${POSTGRES_USER:-openfamily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-openfamily}']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: openfamily-server
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-openfamily}
      POSTGRES_USER: ${POSTGRES_USER:-openfamily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SERVER_PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Cookie auth (sécu #10)
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      JWT_ACCESS_TTL_SEC: ${JWT_ACCESS_TTL_SEC:-3600}
      JWT_REFRESH_TTL_SEC: ${JWT_REFRESH_TTL_SEC:-604800}
      # Rate limiting global (sécu #9)
      API_RATE_LIMIT_WINDOW_MS: ${API_RATE_LIMIT_WINDOW_MS:-60000}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-300}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      # IA NVIDIA (PR #16-17)
      AI_ENABLED: ${AI_ENABLED:-true}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_API_BASE_URL: ${NVIDIA_API_BASE_URL:-https://integrate.api.nvidia.com/v1}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-meta/llama-3.1-8b-instruct}
      AI_MODEL_HEAVY: ${AI_MODEL_HEAVY:-meta/llama-3.3-70b-instruct}
      AI_MODEL_VISION: ${AI_MODEL_VISION:-meta/llama-3.2-90b-vision-instruct}
      AI_MONTHLY_TOKEN_LIMIT_PER_USER: ${AI_MONTHLY_TOKEN_LIMIT_PER_USER:-2000000}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-30000}
      AI_STREAMING_ENABLED: ${AI_STREAMING_ENABLED:-true}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    container_name: openfamily-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local
