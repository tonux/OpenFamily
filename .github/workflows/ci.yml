name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm run install:all

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build shared
        run: npm run build:shared

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build:client

  smoke-api:
    name: Smoke API (Docker)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm run install:all

      - name: Prepare CI env
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=openfamily
          POSTGRES_USER=openfamily
          POSTGRES_PASSWORD=openfamily-ci-password
          POSTGRES_PORT=5433
          SERVER_PORT=3001
          NODE_ENV=production
          JWT_SECRET=ci-openfamily-jwt-secret-0123456789-abcdefghijklmnopqrstuvwxyz
          CORS_ORIGINS=http://localhost:3000,http://localhost:5173
          VITE_API_URL=http://localhost:3001
          VITE_WS_URL=ws://localhost:3001
          REGISTRATION_ENABLED=true
          EOF

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3001/health >/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs --tail=200 server
          exit 1

      - name: Run smoke API
        run: npm run smoke:api

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Shutdown stack
        if: always()
        run: docker compose down -v
